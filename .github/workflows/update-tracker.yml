name: Update War Tracker

on:
  schedule:
    # Runs every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update:
    runs-on: [self-hosted, coc-runner]
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure git is in PATH
        run: |
          if ! command -v git &>/dev/null; then
            # Use the git binary bundled inside the Actions runner — no install needed
            RUNNER_GIT=$(find /home/opc/actions-runner -name "git" -type f 2>/dev/null | head -1)
            if [ -n "$RUNNER_GIT" ]; then
              echo "$(dirname "$RUNNER_GIT")" >> "$GITHUB_PATH"
              echo "Using runner-bundled git: $RUNNER_GIT"
            else
              echo "ERROR: git not found anywhere on this runner" && exit 1
            fi
          else
            echo "git already in PATH: $(which git)"
          fi

      - name: Run update script
        env:
          COC_API_KEY: ${{ secrets.COC_API_KEY }}
        run: python3 update_tracker.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build_tracker.py buzzzzz-war-tracker.html
          git diff --staged --quiet || git commit -m "Auto-update war tracker $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
