name: Update War Tracker

on:
  schedule:
    # Runs every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update:
    runs-on: [self-hosted, coc-runner]
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run update script
        env:
          COC_API_KEY: ${{ secrets.COC_API_KEY }}
        run: python3 update_tracker.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build_tracker.py buzzzzz-war-tracker.html
          git diff --staged --quiet || git commit -m "Auto-update war tracker $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
