name: Update War Tracker

on:
  schedule:
    # Runs every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update:
    runs-on: [self-hosted, coc-runner]
    timeout-minutes: 270   # up to 4.5 h — allows smart sleep-until-war-ends logic
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run update script
        env:
          COC_API_KEY: ${{ secrets.COC_API_KEY }}
        run: python3 update_tracker.py

      - name: Commit and push via GitHub API
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PYEOF'
          import os, json, base64, hashlib
          from datetime import datetime, timezone
          from urllib.request import urlopen, Request

          TOKEN = os.environ['GITHUB_TOKEN']
          REPO  = 'EyeYouShh/buzzzzz-war-tracker'
          BRANCH = 'main'
          BASE  = f'https://api.github.com/repos/{REPO}'
          H = {
            'Authorization': f'token {TOKEN}',
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          }

          now   = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          files = ['index.html', 'cwl.html', 'build_tracker.py']
          committed = []

          for fname in files:
            if not os.path.exists(fname):
              print(f'{fname}: not found, skipping')
              continue
            content = open(fname, 'rb').read()

            # Compute git blob SHA to detect changes
            git_sha = hashlib.sha1(
              f'blob {len(content)}\0'.encode() + content
            ).hexdigest()

            # Get remote blob SHA
            req    = Request(f'{BASE}/contents/{fname}?ref={BRANCH}', headers=H)
            remote = json.loads(urlopen(req).read())

            if remote['sha'] == git_sha:
              print(f'{fname}: unchanged, skipping')
              continue

            # Push updated file
            body = json.dumps({
              'message': f'Auto-update war tracker {now}',
              'content': base64.b64encode(content).decode(),
              'sha':     remote['sha'],
              'branch':  BRANCH
            }).encode()
            req = Request(f'{BASE}/contents/{fname}', data=body, method='PUT', headers=H)
            r   = json.loads(urlopen(req).read())
            print(f'Committed {fname}: {r["commit"]["sha"][:7]}')
            committed.append(fname)

          print('Done — ' + (f'pushed {committed}' if committed else 'no changes'))
          PYEOF
